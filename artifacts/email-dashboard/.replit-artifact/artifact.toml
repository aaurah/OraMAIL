kind = "web"
previewPath = "/"
title = "Email Dashboard"
version = "1.0.0"
id = "artifacts/email-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23900

[services.development]
run = "pnpm --filter @workspace/email-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/email-dashboard", "run", "build" ]
publicDir = "artifacts/email-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23900"
BASE_PATH = "/"
